name: Snailicid3 Work Item
description: Create a feature, bug, or design issue for the Snailicid3
title: "<type>(<scope>): <short summary>"
labels: []
assignees: []

body:
  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: What kind of work is this?
      options:
        - Feature
        - Bug
        - Task
        - Refactor
        - Docs
        - Chore
        - Idea
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which package or repository scope does this affect?
      options:
        - root
        - notes
        - "@snailicid3/playground"
        - "@snailicid3/build-config"
        - "@snailicid3/cli-app"
        - "@snailicid3/color"
        - "@snailicid3/config"
        - "@snailicid3/example-package"
        - "@snailicid3/logger"
        - "@snailicid3/node-utils"
        - "@snailicid3/scaffold"
        - "@snailicid3/types"
        - "@snailicid3/utils"
        - "@snailicid3/workspace-tools"
        - "@snailicid3/zod-helpers"
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the problem or request
      placeholder: Describe the issue briefly.
    validations:
      required: true

  - type: textarea
    id: requirements
    attributes:
      label: Requirements
      description: Checklist or acceptance criteria
      placeholder: |
        - [ ] Requirement 1
        - [ ] Requirement 2
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Extra context, links, screenshots, blockers, or references
      placeholder: |
        Related to #123
        Blocked by #456
    validations:
      required: false
