# Runs on every push to `main`. This answers: "is main busted after merge?"
name: Push Main
on:
    push:
        branches:
            - main

concurrency:
    group: push-main-${{ github.ref }}
    cancel-in-progress: false

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    required:
        name: required
        uses: gbtunney/snailicid3-actions/.github/workflows/call-pipeline.yml@main
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true
