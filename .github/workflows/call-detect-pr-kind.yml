name: Call Detect PR Kind

on:
    workflow_call:
        outputs:
            is_release_pr:
                description: 'true when PR looks like generated release/main version PR'
                value: ${{ jobs.detect.outputs.is_release_pr }}
            has_added_or_modified_changeset:
                description: 'true when PR adds or modifies .changeset/*.md'
                value: ${{ jobs.detect.outputs.has_added_or_modified_changeset }}
            has_deleted_changeset:
                description: 'true when PR deletes .changeset/*.md'
                value: ${{ jobs.detect.outputs.has_deleted_changeset }}
            has_package_changes:
                description: 'true when PR changes package.json files'
                value: ${{ jobs.detect.outputs.has_package_changes }}
            has_changelog_changes:
                description: 'true when PR changes CHANGELOG.md files'
                value: ${{ jobs.detect.outputs.has_changelog_changes }}

permissions:
    contents: read

jobs:
    detect:
        name: detect
        runs-on: ubuntu-latest

        outputs:
            is_release_pr: ${{ steps.detect.outputs.is_release_pr }}
            has_added_or_modified_changeset: ${{ steps.detect.outputs.has_added_or_modified_changeset }}
            has_deleted_changeset: ${{ steps.detect.outputs.has_deleted_changeset }}
            has_package_changes: ${{ steps.detect.outputs.has_package_changes }}
            has_changelog_changes: ${{ steps.detect.outputs.has_changelog_changes }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Detect PR kind
              id: detect
              shell: bash
              run: |
                  BASE_REF="${GITHUB_BASE_REF:-main}"

                  git fetch origin "$BASE_REF"

                  STATUS="$(git diff --name-status "origin/$BASE_REF"...HEAD)"
                  NAMES="$(git diff --name-only "origin/$BASE_REF"...HEAD)"

                  has_added_or_modified_changeset=false
                  has_deleted_changeset=false
                  has_package_changes=false
                  has_changelog_changes=false
                  is_release_pr=false

                  if echo "$STATUS" | grep -qE '^[AM][[:space:]]+\.changeset/[^/]+\.md$'; then
                    has_added_or_modified_changeset=true
                  fi

                  if echo "$STATUS" | grep -qE '^D[[:space:]]+\.changeset/[^/]+\.md$'; then
                    has_deleted_changeset=true
                  fi

                  if echo "$NAMES" | grep -qE '(^|/)package\.json$'; then
                    has_package_changes=true
                  fi

                  if echo "$NAMES" | grep -qE '(^|/)CHANGELOG\.md$'; then
                    has_changelog_changes=true
                  fi

                  if [[ "${GITHUB_HEAD_REF}" == "release/main" ]] &&
                     [[ "$has_deleted_changeset" == "true" ]] &&
                     [[ "$has_package_changes" == "true" ]] &&
                     [[ "$has_changelog_changes" == "true" ]]; then
                    is_release_pr=true
                  fi

                  {
                    echo "is_release_pr=$is_release_pr"
                    echo "has_added_or_modified_changeset=$has_added_or_modified_changeset"
                    echo "has_deleted_changeset=$has_deleted_changeset"
                    echo "has_package_changes=$has_package_changes"
                    echo "has_changelog_changes=$has_changelog_changes"
                  } >> "$GITHUB_OUTPUT"

                  {
                    echo "## PR kind"
                    echo ""
                    echo "- base_ref: \`$BASE_REF\`"
                    echo "- is_release_pr: \`$is_release_pr\`"
                    echo "- has_added_or_modified_changeset: \`$has_added_or_modified_changeset\`"
                    echo "- has_deleted_changeset: \`$has_deleted_changeset\`"
                    echo "- has_package_changes: \`$has_package_changes\`"
                    echo "- has_changelog_changes: \`$has_changelog_changes\`"
                  } >> "$GITHUB_STEP_SUMMARY"
