# Runs only after merge to `main`.
#
# Phase detection (call-detect-release-phase.yml) decides what to do:
#   🔖 version packages — pending changesets exist → bump versions, push
#                          release/main, create/update PR, trigger pr-checks.
#   📦 publish packages — last commit was a version bump → publish to npm,
#                          create GitHub releases.
#   (skip)              — unrelated commit → only detect runs.
#
# The split into version-release / publish-release jobs makes the GitHub UI
# immediately show which phase ran without opening the logs.
name: Push Release

on:
    push:
        branches:
            - main

concurrency:
    group: release-main
    cancel-in-progress: false

permissions:
    actions: write
    contents: write
    pull-requests: write
    id-token: write

env:
    HUSKY: 0
    NPM_CONFIG_PROVENANCE: true
    NX_NO_CLOUD: 'true'

jobs:
    # ── Detect ──────────────────────────────────────────────────────────────
    detect:
        uses: ./.github/workflows/call-detect-release-phase.yml

    # ── Shared pipeline (build + test, upload built artifact) ───────────────
    pipeline:
        needs: detect
        if: >-
            ${{
              needs.detect.outputs.should_version == 'true' ||
              needs.detect.outputs.should_publish == 'true'
            }}
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true
            upload_built_artifact: true

    # ── Phase 1 — version packages ──────────────────────────────────────────
    # Bump versions, compute scoped commit message, push to release/main,
    # create/update the version PR, trigger pr-checks on the new branch.
    version-release:
        name: "🔖 version packages"
        runs-on: ubuntu-latest
        needs: [detect, pipeline]
        if: needs.detect.outputs.should_version == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # ── Restore built output from pipeline ───────────────────────
            - name: 📥 Download built output artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline.outputs.built_artifact_name }}
                  path: ${{ runner.temp }}/built-output

            - name: ♻️ Overlay built output onto workspace
              shell: bash
              run: |
                  rsync -a \
                    --exclude='.git/' \
                    "${{ runner.temp }}/built-output"/ "$GITHUB_WORKSPACE"/

            # ── Version packages ─────────────────────────────────────────
            - name: Version packages
              run: pnpm changeset version

            - name: Stage and compute scoped commit message
              id: version_msg
              shell: bash
              run: |
                  git add -A
                  MSG="$(pnpm exec scope-commit --staged --message release "version packages" \
                          2>/dev/null || echo "release(root): version packages")"
                  echo "message=$MSG" >> "$GITHUB_OUTPUT"
                  echo "Commit message: $MSG"

            - name: Commit version changes
              shell: bash
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config commit.gpgsign false

                  if git diff --cached --quiet; then
                    echo "No staged version changes to commit."
                    exit 0
                  fi

                  git commit -m "${{ steps.version_msg.outputs.message }}"

            - name: Push to release/main branch
              run: git push origin HEAD:refs/heads/release/main --force

            - name: Create or update version PR
              shell: bash
              run: |
                  TITLE="${{ steps.version_msg.outputs.message }}"
                  BODY="Automated version bump. Merge this PR to publish packages to npm."
                  PR=$(gh pr list --head release/main --base main --state open \
                          --json number -q '.[0].number' 2>/dev/null || true)
                  if [ -z "$PR" ]; then
                    gh pr create --head release/main --base main --title "$TITLE" --body "$BODY"
                  else
                    gh pr edit "$PR" --title "$TITLE" --body "$BODY"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Trigger PR validation
              run: gh workflow run pr-checks.yml --ref release/main
              env:
                  GH_TOKEN: ${{ github.token }}

    # ── Phase 2 — publish packages ──────────────────────────────────────────
    # Publishes only when: no pending changesets AND the triggering commit is
    # a version bump (is_version_packages_diff).
    publish-release:
        name: "📦 publish packages"
        runs-on: ubuntu-latest
        needs: [detect, pipeline]
        if: needs.detect.outputs.should_publish == 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # ── Restore built output from pipeline ───────────────────────
            - name: 📥 Download built output artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline.outputs.built_artifact_name }}
                  path: ${{ runner.temp }}/built-output

            - name: ♻️ Overlay built output onto workspace
              shell: bash
              run: |
                  rsync -a \
                    --exclude='.git/' \
                    "${{ runner.temp }}/built-output"/ "$GITHUB_WORKSPACE"/

            # ── Publish ──────────────────────────────────────────────────
            - name: Publish packages and create GitHub releases
              uses: changesets/action@v1.7.0
              with:
                  publish: pnpm changeset publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
