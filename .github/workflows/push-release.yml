# Runs only after merge to `main`. Phase 1: creates/updates a version PR (release/main → main)
# with a scoped commit message. Phase 2: publishes to npm after the version PR merges.
name: Push Release

on:
    push:
        branches:
            - main

concurrency:
    group: release-main
    cancel-in-progress: false

permissions:
    actions: write
    contents: write
    pull-requests: write
    id-token: write

env:
    HUSKY: 0
    NPM_CONFIG_PROVENANCE: true

jobs:
    detect:
        name: detect release phase
        runs-on: ubuntu-latest

        outputs:
            has_pending_changesets: ${{ steps.release_phase.outputs.has_pending_changesets }}
            is_version_packages_diff: ${{ steps.release_phase.outputs.is_version_packages_diff }}
            should_version: ${{ steps.release_phase.outputs.should_version }}
            should_publish: ${{ steps.release_phase.outputs.should_publish }}
            should_skip: ${{ steps.release_phase.outputs.should_skip }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            - name: Detect release phase
              id: release_phase
              shell: bash
              run: |
                  changeset_count="$(find .changeset -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')"

                  has_pending_changesets=false
                  if [ "$changeset_count" -gt 0 ]; then
                    has_pending_changesets=true
                  fi

                  STATUS="$(git diff --name-status HEAD^ HEAD)"

                  has_deleted_changeset=false
                  has_package_changes=false
                  has_changelog_changes=false
                  is_version_packages_diff=false

                  if echo "$STATUS" | grep -qE '^D[[:space:]]+\.changeset/[^/]+\.md$'; then
                    has_deleted_changeset=true
                  fi

                  if echo "$STATUS" | grep -qE '^[AM][[:space:]]+(.*/)?package\.json$'; then
                    has_package_changes=true
                  fi

                  if echo "$STATUS" | grep -qE '^[AM][[:space:]]+(.*/)?CHANGELOG\.md$'; then
                    has_changelog_changes=true
                  fi

                  if [[ "$has_pending_changesets" != "true" ]] &&
                     [[ "$has_deleted_changeset" == "true" ]] &&
                     [[ "$has_package_changes" == "true" ]] &&
                     [[ "$has_changelog_changes" == "true" ]]; then
                    is_version_packages_diff=true
                  fi

                  should_version=false
                  should_publish=false
                  should_skip=false

                  if [[ "$has_pending_changesets" == "true" ]]; then
                    should_version=true
                  elif [[ "$is_version_packages_diff" == "true" ]]; then
                    should_publish=true
                  else
                    should_skip=true
                  fi

                  {
                    echo "changeset_count=$changeset_count"
                    echo "has_pending_changesets=$has_pending_changesets"
                    echo "has_deleted_changeset=$has_deleted_changeset"
                    echo "has_package_changes=$has_package_changes"
                    echo "has_changelog_changes=$has_changelog_changes"
                    echo "is_version_packages_diff=$is_version_packages_diff"
                    echo "should_version=$should_version"
                    echo "should_publish=$should_publish"
                    echo "should_skip=$should_skip"
                  } >> "$GITHUB_OUTPUT"

    pipeline:
        needs: detect
        if: >-
            ${{
              needs.detect.outputs.should_version == 'true' ||
              needs.detect.outputs.should_publish == 'true'
            }}


        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true
            upload_built_artifact: true

    release:
        name: release
        runs-on: ubuntu-latest
        needs:
            - detect
            - pipeline
        if: >-
            ${{
              needs.detect.outputs.should_version == 'true' ||
              needs.detect.outputs.should_publish == 'true'
            }}


        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # ── Restore built output from pipeline ───────────────────────
            - name: 📥 Download built output artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline.outputs.built_artifact_name }}
                  path: ${{ runner.temp }}/built-output

            - name: ♻️ Overlay built output onto workspace
              shell: bash
              run: |
                  rsync -a \
                    --exclude='.git/' \
                    "${{ runner.temp }}/built-output"/ "$GITHUB_WORKSPACE"/

            # ── Phase 1 — version PR ──────────────────────────────────────
            # Bump versions, compute scoped commit message, push to release/main, create/update PR.
            - name: Version packages
              if: needs.detect.outputs.should_version == 'true'
              run: pnpm changeset version

            - name: Stage and compute scoped commit message
              id: version_msg
              if: needs.detect.outputs.should_version == 'true'
              shell: bash
              run: |
                  git add -A
                  MSG="$(pnpm exec scope-commit --staged --message release "version packages" \
                          2>/dev/null || echo "release(root): version packages")"
                  echo "message=$MSG" >> "$GITHUB_OUTPUT"
                  echo "Commit message: $MSG"

            - name: Commit version changes
              if: needs.detect.outputs.should_version == 'true'
              shell: bash
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config commit.gpgsign false

                  if git diff --cached --quiet; then
                    echo "No staged version changes to commit."
                    exit 0
                  fi

                  git commit -m "${{ steps.version_msg.outputs.message }}"

            - name: Push to release/main branch
              if: needs.detect.outputs.should_version == 'true'
              run: git push origin HEAD:refs/heads/release/main --force

            - name: Create or update version PR
              if: needs.detect.outputs.should_version == 'true'
              shell: bash
              run: |
                  TITLE="${{ steps.version_msg.outputs.message }}"
                  BODY="Automated version bump. Merge this PR to publish packages to npm."
                  PR=$(gh pr list --head release/main --base main --state open \
                          --json number -q '.[0].number' 2>/dev/null || true)
                  if [ -z "$PR" ]; then
                    gh pr create --head release/main --base main --title "$TITLE" --body "$BODY"
                  else
                    gh pr edit "$PR" --title "$TITLE" --body "$BODY"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Trigger release PR validation
              if: needs.detect.outputs.should_version == 'true'
              run: gh workflow run pr-release.yml --ref release/main
              env:
                  GH_TOKEN: ${{ github.token }}

            # Trigger docs build on the release branch so API reports and docs
            # are refreshed automatically. dispatch-build-docs commits any dirty
            # tracked files (etc/*.api.md) back to release/main. If GH_PAT is
            # not set the push will use GITHUB_TOKEN and won't re-trigger CI,
            # but the files will still be committed.
            - name: Trigger docs build on release branch
              if: needs.detect.outputs.should_version == 'true'
              run: gh workflow run dispatch-build-docs.yml --ref release/main
              env:
                  GH_TOKEN: ${{ github.token }}

            # ── Phase 2 — publish ─────────────────────────────────────────
            # Publishes only when: no pending changesets AND the triggering commit is a version bump.
            - name: Publish packages and create GitHub releases
              if: needs.detect.outputs.should_publish == 'true'
              uses: changesets/action@v1
              with:
                  publish: pnpm changeset publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
