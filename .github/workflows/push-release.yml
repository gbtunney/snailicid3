# Runs only after merge to `main`. Phase 1: creates/updates a version PR (release/main → main)
# with a scoped commit message. Phase 2: publishes to npm after the version PR merges.
name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: release-main
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write
    id-token: write

env:
    HUSKY: 0
    NPM_CONFIG_PROVENANCE: true

jobs:
    pipeline:
        uses: ./.github/workflows/pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true
            upload_built_artifact: true

    release:
        name: release
        runs-on: ubuntu-latest
        needs: pipeline

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # ── Restore built output from pipeline ───────────────────────
            - name: 📥 Download built output artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline.outputs.built_artifact_name }}
                  path: ${{ runner.temp }}/built-output

            - name: ♻️ Overlay built output onto workspace
              shell: bash
              run: |
                  rsync -a \
                    --exclude='.git/' \
                    "${{ runner.temp }}/built-output"/ "$GITHUB_WORKSPACE"/

            # Count pending .changeset/*.md files (excludes README.md)
            - name: Check for pending changesets
              id: has_changesets
              shell: bash
              run: |
                  count=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  echo "has=$( [ "$count" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
                  echo "Pending changesets: $count"

            # ── Phase 1 — version PR ──────────────────────────────────────
            # Bump versions, compute scoped commit message, push to release/main, create/update PR.
            - name: Version packages
              if: steps.has_changesets.outputs.has == 'true'
              run: pnpm changeset version

            - name: Stage and compute scoped commit message
              id: version_msg
              if: steps.has_changesets.outputs.has == 'true'
              shell: bash
              run: |
                  git add -A
                  MSG="$(pnpm exec scope-commit --staged --message chore "version packages" \
                          2>/dev/null || echo "chore(release): version packages")"
                  echo "message=$MSG" >> "$GITHUB_OUTPUT"
                  echo "Commit message: $MSG"

            - name: Commit version changes
              if: steps.has_changesets.outputs.has == 'true'
              shell: bash
              run: |
                  git config user.name  "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                  git config commit.gpgsign false

                  if git diff --cached --quiet; then
                    echo "No staged version changes to commit."
                    exit 0
                  fi

                  git commit -m "${{ steps.version_msg.outputs.message }}"

            - name: Push to release/main branch
              if: steps.has_changesets.outputs.has == 'true'
              run: git push origin HEAD:refs/heads/release/main --force

            - name: Create or update version PR
              if: steps.has_changesets.outputs.has == 'true'
              shell: bash
              run: |
                  TITLE="${{ steps.version_msg.outputs.message }}"
                  BODY="Automated version bump. Merge this PR to publish packages to npm."
                  PR=$(gh pr list --head release/main --base main --state open \
                          --json number -q '.[0].number' 2>/dev/null || true)
                  if [ -z "$PR" ]; then
                    gh pr create --head release/main --base main --title "$TITLE" --body "$BODY"
                  else
                    gh pr edit "$PR" --title "$TITLE" --body "$BODY"
                  fi
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # ── Phase 2 — publish ─────────────────────────────────────────
            # Publishes only when: no pending changesets AND the triggering commit is a version bump.
            - name: Publish packages and create GitHub releases
              if: |
                  steps.has_changesets.outputs.has == 'false' &&
                  contains(github.event.head_commit.message, ': version packages')
              uses: changesets/action@v1
              with:
                  publish: pnpm changeset publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
