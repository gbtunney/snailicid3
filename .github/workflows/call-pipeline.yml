# ─────────────────────────────────────────────────────────────
# WORKFLOW: Pipeline
# TYPE: reusable (workflow_call)
#
# Notes:
# - Inputs are typed; outputs are strings (boolean-like outputs use 'true'/'false').
# - In mode=report, many steps use continue-on-error to produce a full report.
# - Workspace artifact upload is optional and uploads from filesystem globs (does not respect .gitignore).
# ─────────────────────────────────────────────────────────────

name: Pipeline 🚰

on:
    workflow_call:
        inputs:
            # options: report | abort_on_error
            mode:
                required: false
                default: report
                type: string

            # options: fix | check | skip
            check_mode:
                required: false
                default: check
                type: string

            # If true: frozen-lockfile failure is treated as required.
            # If false: relaxed install is allowed to recover from lockfile mismatch.
            require_lockfile:
                required: false
                default: false
                type: boolean

            run_build:
                required: false
                default: true
                type: boolean

            run_test:
                required: false
                default: false
                type: boolean

            run_docs_build:
                required: false
                default: false
                type: boolean

            # If true: fail/report if repo is dirty at the end of the workflow.
            require_clean_repo:
                required: false
                default: false
                type: boolean

            # Artifact upload options
            upload_workspace_artifact:
                required: false
                default: false
                type: boolean

            artifact_name_prefix:
                required: false
                default: workspace
                type: string

            # When true, upload a separate artifact containing dist/ and types/ output
            # (not conditioned on is_repo_dirty, so it works even when nothing is dirty).
            upload_built_artifact:
                required: false
                default: false
                type: boolean

            node_version:
                description: Node version to run the pipeline with.
                required: false
                default: lts/*
                type: string
            # reset caching options
            nx_cache_reset:
                required: false
                default: false
                type: boolean

            pnpm_cache:
                required: false
                default: true
                type: boolean

            # Nx Cloud / affected options
            use_nx_affected:
                description: Run nx affected instead of full workspace build/test/check routines.
                required: false
                default: false
                type: boolean

            nx_targets:
                description: Space-delimited Nx targets for affected mode.
                required: false
                default: lint test build
                type: string

            nx_fix_ci:
                description: Run nx fix-ci after main steps (Nx Cloud self-healing CI).
                required: false
                default: false
                type: boolean

        outputs:
            is_repo_dirty:
                description: Whether repository is dirty at end ('true'|'false')
                value: ${{ jobs.pipeline.outputs.is_repo_dirty }}

            workspace_artifact_name:
                description: Artifact name if uploaded; empty string otherwise
                value: ${{ jobs.pipeline.outputs.workspace_artifact_name }}

            artifact_uploaded:
                description: Whether artifact upload ran successfully ('true'|'false')
                value: ${{ jobs.pipeline.outputs.artifact_uploaded }}

            built_artifact_name:
                description: Name of the built-output artifact (dist/types), or empty if not uploaded
                value: ${{ jobs.pipeline.outputs.built_artifact_name }}

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    pipeline:
        runs-on: ubuntu-latest
        name: pipeline
        outputs:
            is_repo_dirty: ${{ steps.repo_dirty.outputs.is_repo_dirty }}
            workspace_artifact_name: ${{ steps.artifact_name.outputs.name }}
            artifact_uploaded: ${{ steps.artifact_uploaded.outputs.artifact_uploaded }}
            built_artifact_name: ${{ steps.built_artifact_name.outputs.name }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v4
              with:
                  run_install: false
                  cache: ${{ inputs.pnpm_cache }}

            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: ${{ inputs.pnpm_cache && 'pnpm' || '' }}

            # ── Input summary ────────────────────────────────────────
            # Note: no native foreach over inputs; keep this explicit.
            - name: 🌸 Input Summary
              shell: bash
              run: |
                  {
                    echo "## Pipeline inputs"
                    echo ""
                    echo "- mode: \`${{ inputs.mode }}\`"
                    echo "- check_mode: \`${{ inputs.check_mode }}\`"
                    echo "- require_lockfile: \`${{ inputs.require_lockfile }}\`"
                    echo "- require_clean_repo: \`${{ inputs.require_clean_repo }}\`"
                    echo "- run_build: \`${{ inputs.run_build }}\`"
                    echo "- run_test: \`${{ inputs.run_test }}\`"
                    echo "- run_docs_build: \`${{ inputs.run_docs_build }}\`"
                    echo "- nx_cache_reset: \`${{ inputs.nx_cache_reset }}\`"
                    echo "- pnpm_cache: \`${{ inputs.pnpm_cache }}\`"
                    echo "- upload_workspace_artifact: \`${{ inputs.upload_workspace_artifact }}\`"
                    echo "- artifact_name_prefix: \`${{ inputs.artifact_name_prefix }}\`"
                    echo "- upload_built_artifact: \`${{ inputs.upload_built_artifact }}\`"
                    echo "- use_nx_affected: \`${{ inputs.use_nx_affected }}\`"
                    echo "- nx_targets: \`${{ inputs.nx_targets }}\`"
                    echo "- nx_fix_ci: \`${{ inputs.nx_fix_ci }}\`"
                  } | tee -a "$GITHUB_STEP_SUMMARY"

            - name: 🩺 Report Environment
              if: ${{ always() }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: bash .github/scripts/report-env.sh

            - name: 🗂️ Report Repository
              if: ${{ always() }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: bash .github/scripts/report-repo.sh

            # ── Install attempts ─────────────────────────────────────
            - name: 📦 Install Frozen Lockfile
              id: install_frozen
              continue-on-error: true
              run: pnpm install --frozen-lockfile

            - name: 📦 Install Relaxed Lockfile (fallback)
              id: install_relaxed
              if: ${{ steps.install_frozen.outcome == 'failure' && !inputs.require_lockfile }}
              run: pnpm install --no-frozen-lockfile

            - name: 🚨 Validate Install
              if: ${{ steps.install_frozen.outcome == 'failure' && (inputs.require_lockfile || steps.install_relaxed.outcome == 'failure') }}
              run: |
                  echo "Install failed. Frozen lockfile install failed and either require_lockfile=true or relaxed install also failed."
                  exit 1

            # ── Nx affected SHA detection ────────────────────────────
            - uses: nrwl/nx-set-shas@v4
              if: ${{ inputs.use_nx_affected }}

            - name: 🎀 Report Prettier
              if: ${{ always() }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: bash .github/scripts/report-prettier.sh

            - name: 📚 Report Workspace
              if: ${{ always() }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: bash .github/scripts/report-workspace.sh

            # ── Cache resets ─────────────────────────────────────────
            - name: 🧹 Reset Nx Cache
              if: ${{ inputs.nx_cache_reset }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm nx:reset

            # ── Nx affected mode ─────────────────────────────────────
            - name: 🎯 Run Nx Affected
              if: ${{ inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm exec nx affected -t ${{ inputs.nx_targets }}

            # ── Full workspace routines (skipped when use_nx_affected) ─
            - name: 🏗️ Run Build
              if: ${{ inputs.run_build && !inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm build

            # ── Built output artifact (for release — not conditioned on dirty) ──
            - name: 🏷️ Compute built artifact name
              id: built_artifact_name
              if: ${{ inputs.upload_built_artifact && inputs.run_build }}
              shell: bash
              run: |
                  NAME="built-output-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}"
                  NAME="${NAME//\//-}"
                  echo "name=$NAME" >> "$GITHUB_OUTPUT"
                  echo "Built artifact name: $NAME"

            - name: 📦 Upload built output artifact
              id: upload_built
              if: ${{ inputs.upload_built_artifact && inputs.run_build }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.built_artifact_name.outputs.name }}
                  if-no-files-found: warn
                  path: |
                      **/dist/**
                      **/types/**
                      !**/node_modules/**

            - name: 🧪 Run Test
              if: ${{ inputs.run_test && !inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm test

              # ── Routines ────────────────────────────────────────────
            - name: ✨ Run Fix Routine
              if: ${{ inputs.check_mode == 'fix' && !inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm fix

            - name: ✅ Run Check Routine
              if: ${{ inputs.check_mode == 'check' && !inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm check

            - name: ⏭️ Skip Check Routine
              if: ${{ inputs.check_mode == 'skip' && !inputs.use_nx_affected }}
              run: echo "check_mode=skip"

            - name: 📘 Run Docs Build
              if: ${{ inputs.run_docs_build && !inputs.use_nx_affected }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              run: pnpm run docs:build

            # ── Clean repo gate + dirty output ──────────────────────
            - name: 🧼 Require Clean Repo
              if: ${{ inputs.require_clean_repo }}
              continue-on-error: ${{ inputs.mode == 'report' }}
              shell: bash
              run: |
                  if [ -n "$(git status --porcelain)" ]; then
                    echo "repository is dirty"
                    exit 1
                  fi

            - name: 🧾 Compute is_repo_dirty output
              id: repo_dirty
              if: ${{ always() }}
              shell: bash
              run: |
                  if [ -n "$(git status --porcelain)" ]; then
                    echo "is_repo_dirty=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_repo_dirty=false" >> "$GITHUB_OUTPUT"
                  fi

            # ── Artifact upload + outputs ────────────────────────────
            - name: 🏷️ Compute artifact name
              id: artifact_name
              if: ${{ inputs.upload_workspace_artifact && steps.repo_dirty.outputs.is_repo_dirty == 'true'}}
              shell: bash
              run: |
                  NAME="${{ inputs.artifact_name_prefix }}-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}"
                  NAME="${NAME//\//-}"
                  echo "name=$NAME" >> "$GITHUB_OUTPUT"
                  echo "Artifact name: $NAME"

            - name: 📦 Upload workspace artifact
              id: upload_workspace
              if: ${{ inputs.upload_workspace_artifact && steps.repo_dirty.outputs.is_repo_dirty == 'true' }}
              shell: bash
              run: |
                  ARCHIVE_PATH="${{ runner.temp }}/workspace-artifact.tar.gz"
                  tar -czf "$ARCHIVE_PATH" \
                    --exclude='.git' \
                    --exclude='**/node_modules' \
                    --exclude='**/.nx/cache' \
                    --exclude='**/.pnpm-store' \
                    --exclude='**/coverage' \
                    --exclude='**/.turbo' \
                    .

                  echo "archive_path=$ARCHIVE_PATH" >> "$GITHUB_OUTPUT"

            - name: 📦 Upload workspace artifact file
              id: upload_workspace_file
              if: ${{ inputs.upload_workspace_artifact && steps.repo_dirty.outputs.is_repo_dirty == 'true' }}
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact_name.outputs.name }}
                  if-no-files-found: error
                  path: ${{ steps.upload_workspace.outputs.archive_path }}

            - name: 🧾 Compute artifact_uploaded output
              id: artifact_uploaded
              if: ${{ steps.repo_dirty.outputs.is_repo_dirty == 'true'}}
              shell: bash
              run: |
                  if [ "${{ inputs.upload_workspace_artifact }}" != "true" ]; then
                    echo "artifact_uploaded=false" >> "$GITHUB_OUTPUT"
                    exit 0
                  fi

                  if [ "${{ steps.upload_workspace_file.outcome }}" = "success" ]; then
                    echo "artifact_uploaded=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "artifact_uploaded=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 🧾 Output Summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo ""
                    echo "## Outputs"
                    echo ""
                    echo "- is_repo_dirty: \`${{ steps.repo_dirty.outputs.is_repo_dirty }}\`"
                    echo "- artifact_uploaded: \`${{ steps.artifact_uploaded.outputs.artifact_uploaded }}\`"
                    echo "- workspace_artifact_name: \`${{ steps.artifact_name.outputs.name }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"

            # ── Nx Cloud self-healing CI ─────────────────────────────
            - name: 🔧 Nx Cloud Fix CI
              if: ${{ always() && inputs.nx_fix_ci }}
              continue-on-error: true
              run: pnpm exec nx fix-ci

            - name: 🌈 Done
              if: ${{ always() }}
              run: echo "Pipeline workflow completed."
