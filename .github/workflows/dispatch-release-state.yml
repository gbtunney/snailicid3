name: Dispatch Release State

# ─────────────────────────────────────────────────────────────
# WORKFLOW: Dispatch Release State
# TYPE: manual workflow_dispatch wrapper
#
# Purpose:
#   Manual button for testing the reusable release-state detector.
#
# This workflow intentionally contains almost no logic.
# It only calls:
#
#   ./.github/workflows/call-detect-release-state.yml
#
# Example refs:
#   main
#   feat/my-branch
#   release/silver-ants
#   2567ffec98429cd9bcc2b3e6165b54cbd9330dee
# ─────────────────────────────────────────────────────────────

on:
    workflow_dispatch:
        inputs:
            ref:
                description: Branch, tag, or SHA to inspect.
                required: true
                default: main
                type: string

permissions:
    contents: read

jobs:
    detect:
        name: detect release state
        uses: ./.github/workflows/call-detect-release-state.yml
        with:
            ref: ${{ inputs.ref }}
