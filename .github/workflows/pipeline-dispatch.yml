name: Pipeline Dispatch

on:
    workflow_dispatch:
        inputs:
            mode:
                description: Failure mode
                required: true
                default: report
                type: choice
                options:
                    - report
                    - abort_on_error
            check_mode:
                description: Check routine mode
                required: true
                default: check
                type: choice
                options:
                    - fix
                    - check
                    - skip
            run_install:
                description: Run install diagnostics
                required: true
                default: true
                type: boolean
            require_lockfile:
                description: Treat frozen lockfile install as required
                required: true
                default: false
                type: boolean
            require_clean_repo:
                description: Fail if repository becomes dirty
                required: true
                default: false
                type: boolean
            run_build:
                description: Run pnpm build
                required: true
                default: false
                type: boolean
            run_test:
                description: Run pnpm test
                required: true
                default: false
                type: boolean
            run_docs_build:
                description: Run docs build routine
                required: true
                default: false
                type: boolean
            nx_cache_reset:
                description: Run nx cache reset before routines
                required: true
                default: false
                type: boolean
            pnpm_store_reset:
                description: Run pnpm store prune before routines
                required: true
                default: false
                type: boolean
            upload_workspace_artifact:
                description: Upload workspace artifact at end (for debugging / downstream jobs)
                required: true
                default: false
                type: boolean
            artifact_name_prefix:
                description: Artifact name prefix (artifact name also includes repo + run id)
                required: true
                default: workspace
                type: string

permissions:
    contents: read

jobs:
    pipeline:
        uses: ./.github/workflows/pipeline.yml
        with:
            mode: ${{ inputs.mode }}
            check_mode: ${{ inputs.check_mode }}
            run_install: ${{ inputs.run_install }}
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: ${{ inputs.require_clean_repo }}
            run_build: ${{ inputs.run_build }}
            run_test: ${{ inputs.run_test }}
            run_docs_build: ${{ inputs.run_docs_build }}
            nx_cache_reset: ${{ inputs.nx_cache_reset }}
            pnpm_store_reset: ${{ inputs.pnpm_store_reset }}
            upload_workspace_artifact: ${{ inputs.upload_workspace_artifact }}
            artifact_name_prefix: ${{ inputs.artifact_name_prefix }}

    summary:
        name: Summarize pipeline outputs
        runs-on: ubuntu-latest
        needs: pipeline
        if: ${{ always() }}
        steps:
            - name: 🧾 Output Summary
              shell: bash
              run: |
                  {
                    echo "## Pipeline Dispatch 결과"
                    echo ""
                    echo "- pipeline result: \`${{ needs.pipeline.result }}\`"
                    echo "- is_repo_dirty: \`${{ needs.pipeline.outputs.is_repo_dirty }}\`"
                    echo "- artifact_uploaded: \`${{ needs.pipeline.outputs.artifact_uploaded }}\`"
                    echo "- workspace_artifact_name: \`${{ needs.pipeline.outputs.workspace_artifact_name }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
