name: Call Detect Release Phase

# Reusable wrapper around the release-phase detection script.
# Mirrors the pattern of call-detect-pr-kind.yml.
#
# Outputs drive the two-phase push-release.yml state machine:
#   should_version → pending changesets exist, create/update a version PR
#   should_publish → last commit was a version bump, publish to npm
#   should_skip    → nothing to do

on:
    workflow_call:
        outputs:
            has_pending_changesets:
                description: "'true' when .changeset/*.md files (excluding README) exist on disk"
                value: ${{ jobs.detect.outputs.has_pending_changesets }}
            is_version_packages_diff:
                description: "'true' when the HEAD^ HEAD diff looks like a changeset version bump"
                value: ${{ jobs.detect.outputs.is_version_packages_diff }}
            should_version:
                description: "'true' when pending changesets exist — create/update the version PR"
                value: ${{ jobs.detect.outputs.should_version }}
            should_publish:
                description: "'true' when the triggering commit is a version bump — publish packages"
                value: ${{ jobs.detect.outputs.should_publish }}
            should_skip:
                description: "'true' when neither versioning nor publishing is needed"
                value: ${{ jobs.detect.outputs.should_skip }}

permissions:
    contents: read

jobs:
    detect:
        name: detect release phase
        runs-on: ubuntu-latest

        outputs:
            has_pending_changesets: ${{ steps.release_phase.outputs.has_pending_changesets }}
            is_version_packages_diff: ${{ steps.release_phase.outputs.is_version_packages_diff }}
            should_version: ${{ steps.release_phase.outputs.should_version }}
            should_publish: ${{ steps.release_phase.outputs.should_publish }}
            should_skip: ${{ steps.release_phase.outputs.should_skip }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2   # needs HEAD^ HEAD for diff

            - name: Detect release phase
              id: release_phase
              shell: bash
              run: |
                  changeset_count="$(find .changeset -name "*.md" ! -name "README.md" | wc -l | tr -d ' ')"

                  has_pending_changesets=false
                  if [ "$changeset_count" -gt 0 ]; then
                    has_pending_changesets=true
                  fi

                  STATUS="$(git diff --name-status HEAD^ HEAD)"

                  has_deleted_changeset=false
                  has_package_changes=false
                  has_changelog_changes=false
                  is_version_packages_diff=false

                  if echo "$STATUS" | grep -qE '^D[[:space:]]+\.changeset/[^/]+\.md$'; then
                    has_deleted_changeset=true
                  fi

                  if echo "$STATUS" | grep -qE '^[AM][[:space:]]+(.*/)?package\.json$'; then
                    has_package_changes=true
                  fi

                  if echo "$STATUS" | grep -qE '^[AM][[:space:]]+(.*/)?CHANGELOG\.md$'; then
                    has_changelog_changes=true
                  fi

                  if [[ "$has_pending_changesets" != "true" ]] &&
                     [[ "$has_deleted_changeset" == "true" ]] &&
                     [[ "$has_package_changes" == "true" ]] &&
                     [[ "$has_changelog_changes" == "true" ]]; then
                    is_version_packages_diff=true
                  fi

                  should_version=false
                  should_publish=false
                  should_skip=false

                  if [[ "$has_pending_changesets" == "true" ]]; then
                    should_version=true
                  elif [[ "$is_version_packages_diff" == "true" ]]; then
                    should_publish=true
                  else
                    should_skip=true
                  fi

                  {
                    echo "changeset_count=$changeset_count"
                    echo "has_pending_changesets=$has_pending_changesets"
                    echo "has_deleted_changeset=$has_deleted_changeset"
                    echo "has_package_changes=$has_package_changes"
                    echo "has_changelog_changes=$has_changelog_changes"
                    echo "is_version_packages_diff=$is_version_packages_diff"
                    echo "should_version=$should_version"
                    echo "should_publish=$should_publish"
                    echo "should_skip=$should_skip"
                  } >> "$GITHUB_OUTPUT"
