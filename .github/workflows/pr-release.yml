# Blocks generated release PRs into `main`.
# Generated release PR:
# - source branch is release/main
# - deletes consumed .changeset/*.md
# - changes package.json
# - changes CHANGELOG.md
name: PR Release

on:
    pull_request:
        branches:
            - main
    workflow_dispatch:

concurrency:
    group: pr-release-${{ github.event.pull_request.number || github.ref_name }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    detect:
        uses: ./.github/workflows/call-detect-pr-kind.yml

    required:
        name: pr-release / required
        needs: detect
        if: ${{ needs.detect.outputs.is_release_pr == 'true' }}

        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: true
            run_api_report: true
            pnpm_cache: true
