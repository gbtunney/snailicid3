name: Dispatch Docs & Commit

on:
    workflow_dispatch:
        inputs:
            commit_message_type:
                description: Conventional commit type prefix
                required: false
                default: docs
                type: choice
                options: [chore, fix, docs, build]

            commit_message_subject:
                description: Commit subject without type/scope.
                required: false
                default: documentation update
                type: string

            run_verify:
                description: Reserved for follow-up verification workflow wiring.
                required: false
                default: true
                type: boolean

permissions:
    contents: write
    actions: read
    id-token: write

env:
    HUSKY: 0

jobs:
    guard:
        name: Guard — refuse main
        runs-on: ubuntu-latest
        steps:
            - name: Refuse to run on main
              shell: bash
              run: |
                  set -euo pipefail

                  if [[ "${{ github.ref_name }}" == "main" ]]; then
                    echo "::error::Build Docs cannot run on main. Checkout a feature or fix branch first."
                    exit 1
                  fi

                  echo "Branch: ${{ github.ref_name }}"

    pipeline_build_docs:
        name: Run docs pipeline
        needs: guard
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            run_build: true
            run_test: true
            run_docs_build: true
            api_report_mode: update
            require_clean_repo: false
            upload_workspace_artifact: true
            artifact_name_prefix: build-docs-workspace

    apply_workspace_artifact:
        name: Apply artifact and commit
        needs: pipeline_build_docs
        if: ${{ needs.pipeline_build_docs.result == 'success' && needs.pipeline_build_docs.outputs.artifact_uploaded == 'true' }}
        uses: ./.github/workflows/call-apply-workspace-artifact.yml
        secrets: inherit
        with:
            ref: ${{ github.ref_name }}
            artifact_name: ${{ needs.pipeline_build_docs.outputs.workspace_artifact_name }}
            commit_mode: commit_if_dirty
            commit_message: "${{ format('{0}(root): {1}', inputs.commit_message_type, inputs.commit_message_subject) }}"
            scoped_commit_message: true
            push_branch: ${{ github.ref_name }}
