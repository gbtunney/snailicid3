name: Dispatch Docs & Commit

# ─────────────────────────────────────────────────────────────
# Manually triggered workflow for building docs and committing changes
# without opening a Codespace.
#
# Flow:
# - Refuses to run on main.
# - Runs the reusable pipeline in check/build-docs mode.
# - Downloads the pipeline workspace artifact and overlays it onto checkout.
# - Commits only if the restored workspace differs from the checked out branch.
# - Optional verify job controlled by input `run_verify`.
# ─────────────────────────────────────────────────────────────

on:
    workflow_dispatch:
        inputs:
            commit_message_type:
                description: Conventional commit type prefix
                required: false
                default: docs
                type: choice
                options: [chore, fix, docs, build]

            commit_message_subject:
                description: Commit subject (without type/scope). Default is "autofix".
                required: false
                default: Documentation update
                type: string

            commit_user_name:
                description: Git author name + email local-part (email becomes "<name>@<domain>")
                required: false
                default: github-actions[bot]
                type: string

            commit_user_domain:
                description: Git author email domain (email becomes "<name>@<domain>")
                required: false
                default: users.noreply.github.com
                type: string

            run_verify:
                description: Run ci-core verify job (report mode) after committing
                required: false
                default: true
                type: boolean

permissions:
    contents: write
    actions: read

env:
    HUSKY: 0

jobs:
    guard:
        name: Guard — refuse main
        runs-on: ubuntu-latest
        steps:
            - name: 🚫 Refuse to run on main
              shell: bash
              run: |
                  if [ "${{ github.ref_name }}" = "main" ]; then
                    echo "❌ Build Docs cannot run on main. Checkout a feature or fix branch first."
                    exit 1
                  fi
                  echo "✅ Branch: ${{ github.ref_name }}"

    pipeline_build_docs:
        name: Run Doc pipeline
        needs: guard
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            run_build: true
            run_test: true
            run_docs_build: true
            # figure out where this belongs?
            api_report_mode: update
            require_clean_repo: false
            upload_workspace_artifact: true
            artifact_name_prefix: build-docs-workspace

    docs_commit:
        name: Apply artifact and commit
        runs-on: ubuntu-latest
        needs: pipeline_build_docs
        if: ${{ needs.pipeline_build_docs.result == 'success' && needs.pipeline_build_docs.outputs.artifact_uploaded == 'true' }}

        steps:
            # ── Checkout ──────────────────────────────────────────────
            # Use GH_PAT so the push below triggers downstream PR workflows.
            # GITHUB_TOKEN pushes are silently blocked from triggering CI.
            # Create a PAT with repo scope and store it as secret GH_PAT.
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

            - name: ⚠️ Warn if GH_PAT is not set
              if: ${{ env.GH_PAT == '' }}
              shell: bash
              run: echo "::warning::GH_PAT secret is not set — push will use GITHUB_TOKEN and will NOT trigger PR workflows. Add a repo-scoped PAT as secret GH_PAT to enable CI re-runs."
              env:
                  GH_PAT: ${{ secrets.GH_PAT }}

            # ── Restore pipeline artifact ────────────────────────────
            - name: 📥 Download workspace artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline_build_docs.outputs.workspace_artifact_name }}
                  path: ${{ runner.temp }}/workspace-artifact

            - name: ♻️ Overlay artifact onto repo
              shell: bash
              run: |
                  ARTIFACT_DIR="${{ runner.temp }}/workspace-artifact"
                  ARCHIVE_PATH="$(find "$ARTIFACT_DIR" -maxdepth 1 -name '*.tar.gz' | head -n 1)"

                  if [ -z "$ARCHIVE_PATH" ]; then
                    echo "❌ Workspace artifact archive not found."
                    exit 1
                  fi

                  tar -xzf "$ARCHIVE_PATH" -C "$GITHUB_WORKSPACE"

            # ── Check if repo is dirty ────────────────────────────────
            - name: 🧼 Check repo status
              id: dirty
              shell: bash
              run: |
                  STATUS=$(git status --porcelain)
                  if [ -n "$STATUS" ]; then
                    echo "dirty=true" >> "$GITHUB_OUTPUT"
                    echo "⚠️ Repo is dirty. Files to commit:"
                    echo "$STATUS"
                  else
                    echo "dirty=false" >> "$GITHUB_OUTPUT"
                    echo "✅ Nothing to commit."
                  fi

            # ── Commit and push ───────────────────────────────────────
            - name: 🏷️ Compute scoped commit message
              id: scoped_message
              if: ${{ steps.dirty.outputs.dirty == 'true' }}
              shell: bash
              env:
                  SCOPE_COMMIT_SKIP_COMMITLINT: '1'
              run: |
                  TYPE="${{ inputs.commit_message_type }}"
                  SUBJECT="${{ inputs.commit_message_subject }}"

                  git add -A
                  MESSAGE="$(bash packages/config/bin/scope/commit.sh --staged --message "$TYPE" "$SUBJECT" 2>/dev/null || echo "$TYPE(root): $SUBJECT")"
                  echo "message=$MESSAGE" >> "$GITHUB_OUTPUT"
                  echo "✅ Scoped message: $MESSAGE"

            - name: 📝 Commit changes
              if: ${{ steps.dirty.outputs.dirty == 'true' }}
              shell: bash
              run: |
                  git config user.name  "${{ inputs.commit_user_name }}"
                  git config user.email "${{ inputs.commit_user_name }}@${{ inputs.commit_user_domain }}"
                  git config commit.gpgsign false

                  if git diff --cached --quiet; then
                    echo "No staged changes after message generation. Skipping commit."
                    exit 0
                  fi

                  git commit -m "${{ steps.scoped_message.outputs.message }}" \
                    -m "Triggered by: @${{ github.actor }} via workflow_dispatch" \
                    -m "Branch: ${{ github.ref_name }}" \
                    -m "Pipeline artifact: ${{ needs.pipeline_build_docs.outputs.workspace_artifact_name }}" \
                    -m "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

                  echo "✅ Committed: ${{ steps.scoped_message.outputs.message }}"

            - name: 🚀 Push
              if: ${{ steps.dirty.outputs.dirty == 'true' }}
              run: git push origin ${{ github.ref_name }}

            - name: ℹ️ Nothing to commit
              if: ${{ steps.dirty.outputs.dirty == 'false' }}
              run: echo "No changes detected — skipping commit and push."

            - name: 🧾 Summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo "## Autofix summary"
                    echo ""
                    echo "- branch: \`${{ github.ref_name }}\`"
                    echo "- dirty: \`${{ steps.dirty.outputs.dirty }}\`"
                    echo "- pipeline result: \`${{ needs.pipeline_build_docs.result }}\`"
                    echo "- artifact_uploaded: \`${{ needs.pipeline_build_docs.outputs.artifact_uploaded }}\`"
                    echo "- workspace_artifact_name: \`${{ needs.pipeline_build_docs.outputs.workspace_artifact_name }}\`"
                    echo "- verify: \`${{ inputs.run_verify }}\`"
                    echo "- computed_message: \`${{ steps.scoped_message.outputs.message }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
