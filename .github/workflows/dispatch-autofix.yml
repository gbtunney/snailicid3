name: Dispatch Fix & Commit

# ─────────────────────────────────────────────────────────────
# Manually triggered workflow for fixing and committing changes
# without opening a Codespace.
#
# Flow:
# - Refuses to run on main.
# - Runs the reusable pipeline in fix mode.
# - Applies the pipeline workspace artifact through the reusable apply workflow.
# - Commits only if the restored workspace differs from the checked out branch.
# ─────────────────────────────────────────────────────────────

on:
    workflow_dispatch:
        inputs:
            commit_message_type:
                description: Conventional commit type prefix
                required: false
                default: chore
                type: choice
                options: [chore, fix, docs, build]

            commit_message_subject:
                description: Commit subject (without type/scope). Default is "autofix".
                required: false
                default: autofix
                type: string

            run_verify:
                description: Reserved for follow-up verification workflow wiring.
                required: false
                default: true
                type: boolean

permissions:
    contents: write
    actions: read
    id-token: write

env:
    HUSKY: 0

jobs:
    guard:
        name: Guard — refuse main
        runs-on: ubuntu-latest
        steps:
            - name: 🚫 Refuse to run on main
              shell: bash
              run: |
                  if [ "${{ github.ref_name }}" = "main" ]; then
                    echo "❌ Autofix cannot run on main. Checkout a feature or fix branch first."
                    exit 1
                  fi
                  echo "✅ Branch: ${{ github.ref_name }}"

    pipeline_fix:
        name: Run autofix pipeline
        needs: guard
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: report
            check_mode: fix
            require_lockfile: false
            require_clean_repo: false
            upload_workspace_artifact: true
            artifact_name_prefix: autofix-workspace

    apply_workspace_artifact:
        name: Apply artifact and commit
        needs: pipeline_fix
        if: ${{ needs.pipeline_fix.result == 'success' && needs.pipeline_fix.outputs.artifact_uploaded == 'true' }}
        uses: ./.github/workflows/call-apply-workspace-artifact.yml
        secrets: inherit
        with:
            ref: ${{ github.ref_name }}
            artifact_name: ${{ needs.pipeline_fix.outputs.workspace_artifact_name }}
            commit_mode: commit_if_dirty
            commit_message: "${{ format('{0}(root): {1}', inputs.commit_message_type, inputs.commit_message_subject) }}"
            push_branch: ${{ github.ref_name }}
