name: Call Publish Artifact Check

on:
    workflow_call:
        inputs:
            ref:
                description: Branch, tag, or SHA to test. Leave empty for the triggering ref.
                required: false
                default: ''
                type: string

            publish_check_mode:
                description: Safe publish-like command to run after artifact overlay.
                required: false
                default: pack
                type: string

            require_lockfile:
                description: Treat frozen lockfile install as required.
                required: false
                default: true
                type: boolean

            node_version:
                description: Node version to run with.
                required: false
                default: lts/*
                type: string

            pnpm_cache:
                description: Control pnpm cache usage.
                required: false
                default: true
                type: boolean

        outputs:
            workspace_artifact_name:
                description: Workspace snapshot artifact generated by pipeline.
                value: ${{ jobs.pipeline.outputs.workspace_artifact_name }}

            artifact_uploaded:
                description: Whether pipeline uploaded the workspace artifact.
                value: ${{ jobs.pipeline.outputs.artifact_uploaded }}

permissions:
    contents: read
    actions: read

jobs:
    pipeline:
        name: build snapshot artifact
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            api_report_mode: skip
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            upload_workspace_artifact: true
            artifact_name_prefix: publish-check

    inspect_publish_candidate:
        name: overlay artifact and check publish
        runs-on: ubuntu-latest
        needs: pipeline
        env:
            HUSKY: 0
            NX_NO_CLOUD: 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref || github.sha }}

            - name: Setup pnpm
              uses: pnpm/action-setup@v6
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ inputs.node_version }}
                  cache: ${{ inputs.pnpm_cache && 'pnpm' || '' }}
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Download workspace artifact
              uses: actions/download-artifact@v4
              with:
                  name: ${{ needs.pipeline.outputs.workspace_artifact_name }}
                  path: ${{ runner.temp }}/workspace-artifact

            - name: Overlay workspace snapshot
              shell: bash
              run: |
                  set -euo pipefail

                  artifact_dir="${{ runner.temp }}/workspace-artifact"
                  archive_path="$(find "$artifact_dir" -maxdepth 1 -name '*.tar.gz' | head -n 1)"

                  if [ -z "$archive_path" ]; then
                    echo "::error::Workspace artifact archive not found."
                    find "$artifact_dir" -maxdepth 2 -type f -print || true
                    exit 1
                  fi

                  echo "Archive: $archive_path"
                  tar -xzf "$archive_path" -C "$GITHUB_WORKSPACE"

            - name: Report overlaid workspace
              shell: bash
              run: |
                  set -euo pipefail
                  echo "## Overlaid workspace" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  echo "- artifact: \`${{ needs.pipeline.outputs.workspace_artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "- publish_check_mode: \`${{ inputs.publish_check_mode }}\`" >> "$GITHUB_STEP_SUMMARY"
                  echo "" >> "$GITHUB_STEP_SUMMARY"
                  git status --short

            - name: Run publish-like check
              shell: bash
              run: |
                  set -euo pipefail

                  mode="${{ inputs.publish_check_mode }}"

                  case "$mode" in
                    pack)
                      echo "Running pnpm -r pack --dry-run"
                      pnpm -r pack --dry-run
                      ;;
                    publish_dry_run)
                      echo "Running pnpm -r publish --dry-run --no-git-checks"
                      pnpm -r publish --dry-run --no-git-checks
                      ;;
                    changeset_publish_dry_run)
                      echo "Running pnpm changeset publish --dry-run"
                      pnpm changeset publish --dry-run
                      ;;
                    *)
                      echo "::error::Unknown publish_check_mode: $mode"
                      exit 1
                      ;;
                  esac

            - name: Summary
              if: ${{ always() }}
              shell: bash
              run: |
                  {
                    echo ""
                    echo "## Publish artifact check"
                    echo ""
                    echo "- artifact_uploaded: \`${{ needs.pipeline.outputs.artifact_uploaded }}\`"
                    echo "- workspace_artifact_name: \`${{ needs.pipeline.outputs.workspace_artifact_name }}\`"
                    echo "- publish_check_mode: \`${{ inputs.publish_check_mode }}\`"
                  } >> "$GITHUB_STEP_SUMMARY"
