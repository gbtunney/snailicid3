name: Call Publish Artifact Check

on:
    workflow_call:
        inputs:
            ref:
                description: Branch, tag, or SHA to test. Leave empty for the triggering ref.
                required: false
                default: ''
                type: string

            publish_check_mode:
                description: Safe publish-like command to run after artifact overlay.
                required: false
                default: pack
                type: string

            require_lockfile:
                description: Treat frozen lockfile install as required.
                required: false
                default: true
                type: boolean

            node_version:
                description: Node version to run with.
                required: false
                default: lts/*
                type: string

            pnpm_cache:
                description: Control pnpm cache usage.
                required: false
                default: true
                type: boolean

        outputs:
            workspace_artifact_name:
                description: Workspace snapshot artifact generated by pipeline.
                value: ${{ jobs.pipeline.outputs.workspace_artifact_name }}

            artifact_uploaded:
                description: Whether pipeline uploaded the workspace artifact.
                value: ${{ jobs.pipeline.outputs.artifact_uploaded }}

permissions:
    contents: write
    actions: read

jobs:
    publish_command:
        name: select publish check command
        runs-on: ubuntu-latest
        outputs:
            command: ${{ steps.command.outputs.command }}
        steps:
            - name: Select command
              id: command
              shell: bash
              run: |
                  set -euo pipefail

                  case "${{ inputs.publish_check_mode }}" in
                    pack)
                      echo "command=pnpm -r pack --dry-run" >> "$GITHUB_OUTPUT"
                      ;;
                    publish_dry_run)
                      echo "command=pnpm -r publish --dry-run --no-git-checks" >> "$GITHUB_OUTPUT"
                      ;;
                    changeset_publish_dry_run)
                      echo "command=pnpm changeset publish --dry-run" >> "$GITHUB_OUTPUT"
                      ;;
                    *)
                      echo "::error::Unknown publish_check_mode: ${{ inputs.publish_check_mode }}"
                      exit 1
                      ;;
                  esac

    pipeline:
        name: build snapshot artifact
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            api_report_mode: skip
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            upload_workspace_artifact: true
            artifact_name_prefix: publish-check

    apply_workspace_artifact:
        name: apply artifact and run publish check
        needs: [publish_command, pipeline]
        if: ${{ needs.pipeline.outputs.artifact_uploaded == 'true' }}
        uses: ./.github/workflows/call-apply-workspace-artifact.yml
        secrets: inherit
        with:
            ref: ${{ inputs.ref || github.sha }}
            artifact_name: ${{ needs.pipeline.outputs.workspace_artifact_name }}
            commit_mode: skip
            install_dependencies: true
            require_lockfile: ${{ inputs.require_lockfile }}
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            post_overlay_command: ${{ needs.publish_command.outputs.command }}
