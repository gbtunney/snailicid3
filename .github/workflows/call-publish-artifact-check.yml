name: Call Publish Artifact Check

# ─────────────────────────────────────────────────────────────
# WORKFLOW: Publish Artifact Check
# TYPE: reusable (workflow_call)
#
# Purpose:
#   Minimal handoff test:
#     1. Run the reusable pipeline.
#     2. Upload a workspace snapshot artifact.
#     3. Download that artifact in a fresh job.
#     4. Extract/overlay workspace-artifact.tar.gz onto checkout.
#     5. Run a safe publish-like command.
# ─────────────────────────────────────────────────────────────

on:
    workflow_call:
        inputs:
            ref:
                description: Branch, tag, or SHA to test. Leave empty for the triggering ref.
                required: false
                default: ''
                type: string

            publish_check_mode:
                description: Safe publish-like command to run after artifact overlay.
                required: false
                default: pack
                type: string

            require_lockfile:
                description: Treat frozen lockfile install as required.
                required: false
                default: true
                type: boolean

            node_version:
                description: Node version to run with.
                required: false
                default: lts/*
                type: string

            pnpm_cache:
                description: Control pnpm cache usage.
                required: false
                default: true
                type: boolean

        outputs:
            workspace_artifact_name:
                description: Workspace snapshot artifact generated by pipeline.
                value: ${{ jobs.pipeline.outputs.workspace_artifact_name }}

            artifact_uploaded:
                description: Whether pipeline uploaded the workspace artifact.
                value: ${{ jobs.pipeline.outputs.artifact_uploaded }}

permissions:
    contents: read
    actions: read

jobs:
    pipeline:
        name: build snapshot artifact
        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            api_report_mode: skip
            require_lockfile: ${{ inputs.require_lockfile }}
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            node_version: ${{ inputs.node_version }}
            pnpm_cache: ${{ inputs.pnpm_cache }}
            upload_workspace_artifact: true
            artifact_name_prefix: publish-check

    inspect_publish_candidate:
        name: overlay artifact and check publish
        runs-on: ubuntu-latest
        needs: pipeline
        env:
            HUSKY: 0
            NX_NO_CLOUD: 'true'

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.ref || github.sha }}
