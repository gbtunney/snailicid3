# Runs only after merge to `main`. Changesets creates/updates the version PR, or publishes after the version PR is merged.
name: Release

on:
    push:
        branches:
            - main

concurrency:
    group: release-main
    cancel-in-progress: false

permissions:
    contents: write
    pull-requests: write
    id-token: write

env:
    HUSKY: 0
    NPM_CONFIG_PROVENANCE: true

jobs:
    pipeline:
        uses: ./.github/workflows/pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true

    release:
        name: release
        runs-on: ubuntu-latest
        needs: pipeline

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Setup pnpm
              uses: pnpm/action-setup@v4
              with:
                  run_install: false

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: pnpm
                  registry-url: https://registry.npmjs.org

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # Count pending .changeset/*.md files (excludes README.md)
            - name: Check for pending changesets
              id: has_changesets
              shell: bash
              run: |
                  count=$(find .changeset -name "*.md" ! -name "README.md" | wc -l)
                  echo "count=$count" >> "$GITHUB_OUTPUT"
                  echo "has=$( [ "$count" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"
                  echo "Pending changesets: $count"

            # Phase 1 — open/update the version PR when changesets are present.
            # Never publishes; that is handled below only after the version commit lands.
            - name: Create or update version PR
              if: steps.has_changesets.outputs.has == 'true'
              uses: changesets/action@v1
              with:
                  version: pnpm changeset version
                  title: 'chore(release): version packages'
                  commit: 'chore(release): version packages'
                  createGithubReleases: false
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            # Phase 2 — publish only when the version PR commit is the trigger.
            # This prevents accidental publish on unrelated main pushes.
            - name: Publish packages and create GitHub releases
              if: |
                  steps.has_changesets.outputs.has == 'false' &&
                  startsWith(github.event.head_commit.message, 'chore(release):')
              uses: changesets/action@v1
              with:
                  publish: pnpm changeset publish
                  createGithubReleases: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
