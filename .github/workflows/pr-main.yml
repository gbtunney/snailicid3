# Blocks normal PRs into `main` if the repo is busted.
# Not a generated release PR
# AND does not add/modify .changeset/*.md
# → normal PR checks
name: PR Main

on:
    pull_request:
        branches:
            - main

concurrency:
    group: pr-main-${{ github.event.pull_request.number }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    HUSKY: 0

jobs:
    detect:
        uses: ./.github/workflows/call-detect-pr-kind.yml

    required:
        name: pr-main / required
        needs: detect
        if: >-
            ${{
              needs.detect.outputs.is_release_pr != 'true' &&
              needs.detect.outputs.has_added_or_modified_changeset != 'true' }}

        uses: ./.github/workflows/call-pipeline.yml
        with:
            mode: abort_on_error
            check_mode: check
            require_lockfile: true
            require_clean_repo: true
            run_build: true
            run_test: true
            run_docs_build: false
            pnpm_cache: true
