packages:
    - 'packages/*'
    - 'apps/*'

catalog:
    # ── language + testing ─────────────────────────────────────
    typescript: ^5.7.0
    tsx: ^4.19.0
    vitest: ^2.1.0
    '@vitest/coverage-v8': ^2.1.0

    # ── eslint + prettier ──────────────────────────────────────
    eslint: ^9.18.0
    prettier: ^3.4.0
    typescript-eslint: ^8.18.0
    jiti: ^2.4.2
    'eslint-plugin-react-hooks': ^5.1.0
    'eslint-plugin-react-refresh': ^0.4.16
    'eslint-plugin-storybook': ^0.11.1
    markdownlint-cli2: ^0.17.0

    # ── commitlint + husky ─────────────────────────────────────
    '@commitlint/cli': ^19.6.0
    '@commitlint/config-conventional': ^19.6.0
    husky: ^9.1.7
    lint-staged: ^15.3.0
    commitizen: ^4.3.1
    cz-conventional-changelog: ^3.3.0

    # ── changesets ─────────────────────────────────────────────
    '@changesets/cli': ^2.27.0

    # ── nx ─────────────────────────────────────────────────────
    nx: ^20.3.0
    '@nx/devkit': ^20.3.0

    # ── runtime deps ───────────────────────────────────────────
    zod: ^4.0.0
    dayjs: ^1.11.13
    chalk: ^5.4.0
    'type-fest': ^4.26.0
    flat: ^6.0.1
    'ts-deepmerge': ^7.0.0
    ramda: ^0.30.1
    semver: ^7.6.3

    # ── build tooling ──────────────────────────────────────────
    rollup: ^4.24.0

    # ── node types ─────────────────────────────────────────────
    '@types/node': ^22.0.0
    '@types/semver': ^7.5.8

    # ── internal packages ──────────────────────────────────────
    '@snailicid3/types': 'workspace:*'
    '@snailicid3/utils': 'workspace:*'
    '@snailicid3/color': 'workspace:*'
    '@snailicid3/node-utils': 'workspace:*'
    '@snailicid3/zod-helpers': 'workspace:*'
    '@snailicid3/logger': 'workspace:*'
    '@snailicid3/config': 'workspace:*'
    '@snailicid3/build-config': 'workspace:*'
    '@snailicid3/cli-app': 'workspace:*'
    '@snailicid3/scaffold': 'workspace:*'
    '@snailicid3/workspace-tools': 'workspace:*'

catalogs:
    # react tier — packages that render UI
    react:
        react: ^18.3.0
        react-dom: ^18.3.0
        '@types/react': ^18.3.0
        '@types/react-dom': ^18.3.0

    # build tooling devDeps for publishable packages
    build:
        rollup: ^4.24.0
        vite: ^5.4.0
        typedoc: ^0.26.0
        'rollup-plugin-esbuild': ^6.1.0
        '@rollup/plugin-commonjs': ^28.0.0
        '@rollup/plugin-node-resolve': ^15.3.0
        '@rollup/plugin-json': ^6.1.0
